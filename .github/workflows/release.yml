name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}

jobs:
  guard:
    name: guard (tag sanity)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Tag matches workspace version
        run: |
          version=$(awk -F'"' '/^\[workspace\.package\]/{in_section=1; next} /^\[/{in_section=0} in_section && /^version[ =]/{print $2; exit}' Cargo.toml)
          if [ "$GITHUB_REF_NAME" != "v$version" ]; then
            echo "tag $GITHUB_REF_NAME does not match Cargo.toml workspace version $version" >&2
            exit 1
          fi
      - name: Tagged commit is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "tagged commit $GITHUB_SHA is not on main" >&2
            exit 1
          fi
      - name: No published release exists for this tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft 2>/dev/null)" = "false" ]; then
            echo "a published release for $GITHUB_REF_NAME already exists" >&2
            exit 1
          fi

  verify:
    name: verify (CI)
    needs: guard
    uses: ./.github/workflows/ci.yml

  create-release:
    name: create draft release
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft 2>/dev/null)" = "true" ]; then
            gh release delete "$GITHUB_REF_NAME" --yes
          fi
          gh release create "$GITHUB_REF_NAME" --draft --title "$GITHUB_REF_NAME" --generate-notes

  build:
    name: build (${{ matrix.target }})
    needs: create-release
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --locked -p doge-cli --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          asset="doge-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" -C "target/${{ matrix.target }}/release" doge
          echo "ASSET=$asset" >> "$GITHUB_ENV"
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "doge-$env:GITHUB_REF_NAME-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/doge.exe" -DestinationPath $asset
          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Upload asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "$ASSET"

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Undraft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
